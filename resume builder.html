<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder - Student AI Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f6fb;
display:flex;
gap:20px;
padding:20px;
}

.container{
display:flex;
gap:20px;
width:100%;
}

.form-box, .preview-box{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
flex:1;
height:90vh;
overflow:auto;
}

h2{
color:#7c3aed;
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
font-family:'Poppins';
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

.generate{
background:#7c3aed;
color:#fff;
}

.print{
background:#16a34a;
color:#fff;
}

.resume{
padding:20px;
border:1px solid #eee;
border-radius:10px;
}

.name{
font-size:26px;
font-weight:700;
color:#1e293b;
}

.section{
margin-top:15px;
}

.section h3{
border-bottom:2px solid #7c3aed;
padding-bottom:5px;
margin-bottom:8px;
}

@media print{
.form-box, button{
display:none;
}
.preview-box{
width:100%;
box-shadow:none;
}
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form-box">
<h2>Resume Builder</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone">

<textarea id="summary" placeholder="Professional Summary"></textarea>

<input type="text" id="education" placeholder="Education (e.g. MBBS 1st Year)">
<input type="text" id="skills" placeholder="Skills (comma separated)">
<input type="text" id="experience" placeholder="Experience">

<button class="generate" onclick="generateResume()">Generate Resume</button>
<button class="print" onclick="window.print()">Download / Print</button>

</div>

<!-- PREVIEW -->
<div class="preview-box">
<div class="resume" id="resume">

<h2 class="name" id="r_name">Your Name</h2>
<p id="r_contact">Email | Phone</p>

<div class="section">
<h3>Summary</h3>
<p id="r_summary"></p>
</div>

<div class="section">
<h3>Education</h3>
<p id="r_education"></p>
</div>

<div class="section">
<h3>Skills</h3>
<p id="r_skills"></p>
</div>

<div class="section">
<h3>Experience</h3>
<p id="r_experience"></p>
</div>

</div>
</div>

</div>

<script>
function generateResume(){

document.getElementById("r_name").innerText =
document.getElementById("name").value || "Your Name";

document.getElementById("r_contact").innerText =
(document.getElementById("email").value || "Email") +
" | " +
(document.getElementById("phone").value || "Phone");

document.getElementById("r_summary").innerText =
document.getElementById("summary").value;

document.getElementById("r_education").innerText =
document.getElementById("education").value;

let skills = document.getElementById("skills").value;
document.getElementById("r_skills").innerText =
skills ? skills.split(",").map(s => "• " + s.trim()).join("\n") : "";

document.getElementById("r_experience").innerText =
document.getElementById("experience").value;
}
</script>

</body>
</html>
