<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator - Student AI Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --bg:#f4f5ff;
    --card:#ffffff;
    --primary:#7c3aed;
    --text:#222;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#fff;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    transition:0.3s;
}

.calculator{
    width:350px;
    background:var(--card);
    border-radius:30px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.top h2{
    color:var(--primary);
}

.theme-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:var(--primary);
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

.display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    background:#f7f7ff;
    border-radius:20px;
    text-align:right;
    padding:20px;
    font-size:32px;
    color:#222;
    margin-bottom:25px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

button{
    height:65px;
    border:none;
    border-radius:18px;
    font-size:20px;
    cursor:pointer;
    background:#f4f4f4;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.operator{
    background:#ede9fe;
    color:var(--primary);
    font-weight:600;
}

.equal{
    background:var(--primary);
    color:#fff;
}

.clear{
    background:#ffefef;
    color:#ef4444;
}

.zero{
    grid-column:span 2;
}

@media(max-width:400px){
    .calculator{
        width:100%;
    }

    button{
        height:60px;
        font-size:18px;
    }

    .display{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="calculator">

    <div class="top">
        <h2>🧮 Calculator</h2>
        <button class="theme-btn" onclick="toggleDark()">🌙</button>
    </div>

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="backspace()">⌫</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="zero" onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
