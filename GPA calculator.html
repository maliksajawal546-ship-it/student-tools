<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Calculator - Student AI Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f4f6fb;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:800px;
max-width:95%;
background:#fff;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#7c3aed;
margin-bottom:5px;
}

.muted{
text-align:center;
color:#6b7280;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:15px;
}

th, td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

input{
width:90%;
padding:8px;
border:1px solid #ddd;
border-radius:8px;
text-align:center;
}

button{
padding:10px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin:5px;
}

.add{background:#7c3aed;color:#fff;}
.calc{background:#16a34a;color:#fff;}
.reset{background:#ef4444;color:#fff;}

.result{
text-align:center;
font-size:20px;
margin-top:15px;
font-weight:700;
color:#1e293b;
}

</style>
</head>

<body>

<div class="container">

<h1>🎓 GPA Calculator</h1>

<p class="muted">Add subjects, marks, and credit hours to calculate your result.</p>

<table id="table">
<tr>
<th>Subject</th>
<th>Marks (0-100)</th>
<th>Credit Hours</th>
</tr>

<tr>
<td><input type="text" placeholder="Subject"></td>
<td><input type="number" placeholder="Marks"></td>
<td><input type="number" placeholder="Credits"></td>
</tr>
</table>

<button class="add" onclick="addRow()">+ Add Subject</button>
<button class="calc" onclick="calculateGPA()">Calculate GPA</button>
<button class="reset" onclick="resetTable()">Reset</button>

<div class="result" id="result">GPA: 0.00</div>

</div>

<script>

function addRow(){
let table = document.getElementById("table");

let row = table.insertRow();

row.innerHTML = `
<td><input type="text" placeholder="Subject"></td>
<td><input type="number" placeholder="Marks"></td>
<td><input type="number" placeholder="Credits"></td>
`;
}

function calculateGPA(){

let rows = document.querySelectorAll("#table tr");
let totalPoints = 0;
let totalCredits = 0;

for(let i=1;i<rows.length;i++){

let inputs = rows[i].querySelectorAll("input");

let marks = parseFloat(inputs[1].value) || 0;
let credits = parseFloat(inputs[2].value) || 0;

/* convert marks to GPA scale (simple formula) */
let gradePoint = 0;

if(marks >= 85) gradePoint = 4.0;
else if(marks >= 70) gradePoint = 3.0;
else if(marks >= 60) gradePoint = 2.5;
else if(marks >= 50) gradePoint = 2.0;
else gradePoint = 0;

totalPoints += gradePoint * credits;
totalCredits += credits;
}

let gpa = totalCredits ? (totalPoints / totalCredits).toFixed(2) : 0;

document.getElementById("result").innerText = "GPA: " + gpa;
}

function resetTable(){
location.reload();
}

</script>

</body>
</html>
